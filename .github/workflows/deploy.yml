name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install SVG to PNG converter
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Generate OG PNG assets
        run: |
          npm run pregenerate
          find public/og -name '*.svg' -print0 | while IFS= read -r -d '' file; do
            rsvg-convert -w 1200 -h 630 "$file" -o "${file%.svg}.png"
          done

      - name: Generate static files
        run: npm run generate
        env:
          NUXT_PUBLIC_POSTHOG_PUBLIC_KEY: ${{ secrets.NUXT_PUBLIC_POSTHOG_PUBLIC_KEY }}
          NUXT_PUBLIC_POSTHOG_HOST: ${{ vars.NUXT_PUBLIC_POSTHOG_HOST }}
          NUXT_PUBLIC_ANALYTICS_SITE: salafsayings
          NUXT_PUBLIC_ANALYTICS_DOMAIN: salafsayings.arhmn.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ".output/public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
